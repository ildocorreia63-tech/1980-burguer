<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#0d0d0d; color:#fff; font-family:Arial; margin:0;}
header { background:#ff3c00; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
.container { padding:10px;}
.card { background:#1a1a1a; margin-bottom:15px; padding:15px; border-radius:12px;}
button { padding:10px; background:#ff3c00; border:none; color:#fff; border-radius:8px;}
.cart { background:#111; padding:15px; position:fixed; bottom:0; width:100%;}
.finalizar { background:green; width:100%; margin-top:10px;}
input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:none;}
</style>
</head><body><header>🍔 1980 Burguer - PDV</header><div class="container"><div class="card">
<h2>X Tudo Bacon</h2>
<p>R$19</p>
<button onclick="add('X Tudo Bacon',19)">+</button>
</div><div class="card">
<h2>Chicken Bacon</h2>
<p>R$18</p>
<button onclick="add('Chicken Bacon',18)">+</button>
</div></div><div class="cart"><div id="carrinho"></div>
<div id="total"></div><select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Fiado</option>
</select><button class="finalizar" onclick="finalizar()">Finalizar</button>
<button onclick="fecharCaixa()">Fechar Caixa</button>

</div><script>
let carrinho=[];
let total=0;

function add(nome, preco){
carrinho.push(nome);
total+=preco;
atualizar();
}

function atualizar(){
document.getElementById("carrinho").innerHTML=carrinho.join("<br>");
document.getElementById("total").innerHTML="Total: R$ "+total;
}

function salvarVenda(valor,pag){
let vendas=JSON.parse(localStorage.getItem("vendas"))||[];
vendas.push({valor:valor,pagamento:pag,data:new Date()});
localStorage.setItem("vendas",JSON.stringify(vendas));
}

function finalizar(){
let pagamento=document.getElementById("pagamento").value;

salvarVenda(total,pagamento);

let msg="🍔 *1980 BURGUER*%0A%0A";
carrinho.forEach(i=>msg+="- "+i+"%0A");
msg+="%0ATotal: R$ "+total;
msg+="%0APagamento: "+pagamento;

window.open("https://wa.me/5511939243407?text="+msg);

carrinho=[];
total=0;
atualizar();
}

function fecharCaixa(){
let vendas=JSON.parse(localStorage.getItem("vendas"))||[];

let totalDia=0;
let pix=0,din=0,cart=0;

vendas.forEach(v=>{
totalDia+=v.valor;
if(v.pagamento==="Pix") pix+=v.valor;
if(v.pagamento==="Dinheiro") din+=v.valor;
if(v.pagamento==="Cartão") cart+=v.valor;
});

alert(
"💰 Caixa do Dia\n\nTotal: R$ "+totalDia+
"\nPix: "+pix+
"\nDinheiro: "+din+
"\nCartão: "+cart
);
}
</script></body>
</html>
