<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  background: #0d0d0d;
  color: #fff;
  font-family: Arial;
  margin: 0;
}header {
background: #ff3c00;
padding: 15px;
text-align: center;
font-size: 20px;
font-weight: bold;
}

.container {
padding: 10px;
}

.card {
background: #1a1a1a;
margin-bottom: 15px;
padding: 15px;
border-radius: 12px;
}

.card h2 {
margin: 0;
}

.price {
color: #ff3c00;
font-weight: bold;
}

button {
width: 100%;
padding: 12px;
margin-top: 10px;
background: #ff3c00;
border: none;
color: #fff;
border-radius: 8px;
font-size: 16px;
}

.cart {
background: #111;
padding: 15px;
position: fixed;
bottom: 0;
width: 100%;
}

.total {
font-size: 18px;
margin-bottom: 10px;
}

.finalizar {
background: green;
}
</style>

</head><body><header>🍔 1980 Burguer</header><div class="container"><div class="card">
<h2>X Tudo Bacon</h2>
<p class="price">R$19</p>
<button onclick="add('X Tudo Bacon',19)">Adicionar</button>
</div><div class="card">
<h2>Chicken Bacon</h2>
<p class="price">R$18</p>
<button onclick="add('Chicken Bacon',18)">Adicionar</button>
</div><div class="card">
<h2>Exterminador</h2>
<p class="price">R$37</p>
<button onclick="add('Exterminador',37)">Adicionar</button>
</div></div><div class="cart">
<div id="carrinho"></div>
<div class="total" id="total"></div>
<button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div><script>
let itens = [];
let total = 0;

function add(nome, preco){
itens.push(nome);
total += preco;

document.getElementById("carrinho").innerHTML = itens.join(" | ");
document.getElementById("total").innerHTML = "Total: R$ " + total;
}

function finalizar(){
let msg = "🍔 *1980 BURGUER*%0A%0A";
itens.forEach(i => msg += "- " + i + "%0A");
msg += "%0ATotal: R$ " + total;

window.open("https://wa.me/5511939243407?text=" + msg);
}
</script></body>
</html>
