<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#0d0d0d; color:#fff; font-family:Arial; margin:0;}
header { background:#ff3c00; padding:15px; text-align:center; font-size:20px; font-weight:bold;}
.container { padding:10px;}
.card { background:#1a1a1a; margin-bottom:15px; padding:15px; border-radius:12px;}
.price { color:#ff3c00; font-weight:bold;}
.controls { display:flex; justify-content:space-between; align-items:center; margin-top:10px;}
button { padding:10px; background:#ff3c00; border:none; color:#fff; border-radius:8px;}
.cart { background:#111; padding:15px; position:fixed; bottom:0; width:100%;}
.finalizar { background:green; width:100%; margin-top:10px;}
input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:none;}
img { width:100%; border-radius:10px;}
</style>
</head><body><header>🍔 1980 Burguer</header><div class="container"><div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<h2>X Tudo Bacon</h2>
<p class="price">R$19</p>
<div class="controls">
<button onclick="add('X Tudo Bacon',19)">+</button>
<span id="q1">0</span>
<button onclick="removeItem('X Tudo Bacon',19)">-</button>
</div>
</div><div class="card">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<h2>Chicken Bacon</h2>
<p class="price">R$18</p>
<div class="controls">
<button onclick="add('Chicken Bacon',18)">+</button>
<span id="q2">0</span>
<button onclick="removeItem('Chicken Bacon',18)">-</button>
</div>
</div></div><div class="cart"><div id="carrinho"></div>
<div id="total"></div><input type="text" id="nome" placeholder="Seu nome"><select id="tipo">
<option value="Retirada">Retirada</option>
<option value="Entrega">Entrega</option>
</select><input type="text" id="endereco" placeholder="Endereço"><select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Fiado</option>
</select><button class="finalizar" onclick="finalizar()">Finalizar Pedido</button>

</div><script>
let carrinho = {};
let total = 0;

function add(nome, preco){
if(!carrinho[nome]) carrinho[nome]=0;
carrinho[nome]++;
total += preco;
atualizar();
}

function removeItem(nome, preco){
if(carrinho[nome]>0){
carrinho[nome]--;
total -= preco;
}
atualizar();
}

function atualizar(){
let lista="";
for(let item in carrinho){
if(carrinho[item]>0){
lista += item + " x" + carrinho[item] + "<br>";
}
}
document.getElementById("carrinho").innerHTML = lista;
document.getElementById("total").innerHTML = "Total: R$ "+total;
}

function finalizar(){
let nome = document.getElementById("nome").value;
let tipo = document.getElementById("tipo").value;
let endereco = document.getElementById("endereco").value;
let pagamento = document.getElementById("pagamento").value;

let taxa = tipo==="Entrega"?5:0;
let totalFinal = total + taxa;

let msg = "🍔 *1980 BURGUER*%0A%0A";
msg += "Cliente: "+nome+"%0A";

for(let item in carrinho){
if(carrinho[item]>0){
msg += "- "+item+" x"+carrinho[item]+"%0A";
}
}

msg += "%0ATipo: "+tipo;

if(tipo==="Entrega"){
msg += "%0AEndereço: "+endereco;
msg += "%0ATaxa: R$5";
}

msg += "%0APagamento: "+pagamento;
msg += "%0ATotal: R$ "+totalFinal;

window.open("https://wa.me/5511939243407?text="+msg);
}
</script></body>
</html>
